<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaterBuddy</title>
    <meta name="description" content="Your Premium Catering Solution"/>
    <meta name="author" content="CaterBuddy">
    
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
         @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script&family=Satisfy&family=Lobster&display=swap');
        
        @keyframes zoomBackground {
            0% { background-size: 100%; }
            50% { background-size: 110%; }
            100% { background-size: 100%; }
        }
        
        body {
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: zoomBackground 15s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
            text-align: center;
            color: rgb(255, 251, 251);
        }
    
        .navbar {
            display: flex;
            justify-content: flex-end;
            align-items: right;
            padding: 3px;
            border-radius: 10px;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 39%;
            background: rgba(0, 0, 0, 0.3);
        }
        .navbar .nav-links {
            display: flex;
            gap: 20px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 10px;
            font-size: 18px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        .navbar a:hover {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
        }
        #content {
          text-shadow: 10px 10px 5px rgb(34, 39, 38);
            padding: 30px;
        }
        h1 {
            font-size: 50px;
            font-weight: bold;
            font-family: 'Dancing Script', cursive;
            color: white;
        }
        p {
            font-size: 35px;
            font-family: 'Dancing Script', cursive;
            color: rgb(0, 0, 0);
        }
        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>

            <a href="login.html">Login</a>
            <a href="signup.html">Signup</a>

    </nav>
    
    <div id="content">
        <h1>Welcome to CaterBuddy</h1>
        <p>Your premium catering solution at your fingertips.</p>
    </div>
